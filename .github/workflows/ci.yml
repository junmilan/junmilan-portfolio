name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check HTML syntax
        uses: Cyb3r-Jak3/html5validator-action@v8.0.0
        with:
          root: .
          css: false

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude linkedin.com index.html
          fail: true

      - name: Check file sizes
        run: |
          shopt -s nullglob
          MAX_SIZE=500000
          for file in *.html *.css *.js; do
            size=$(stat -c%s "$file")
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "::warning::$file is ${size} bytes (limit: ${MAX_SIZE})"
            else
              echo "✓ $file — ${size} bytes"
            fi
          done
